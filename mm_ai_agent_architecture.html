<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Magic Agent — Architecture</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0e0d;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 400;
    font-size: 28px;
    color: #f5f0ea;
    letter-spacing: 0.02em;
    margin-bottom: 8px;
  }

  .header p {
    font-size: 13px;
    color: #7a756e;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .diagram-wrap {
    width: 100%;
    max-width: 820px;
  }

  /* Layer labels */
  .layer-label {
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    fill: #5a5650;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* Node titles */
  .node-title {
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    fill: #f5f0ea;
  }

  .node-sub {
    font-size: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    fill: #a09890;
  }

  /* Coral — knowledge inputs */
  .coral-fill   { fill: #3a1a12; }
  .coral-stroke { stroke: #c55535; }
  .coral-text   { fill: #f0a085; }
  .coral-sub    { fill: #9a5040; }

  /* Teal — RAG */
  .teal-fill   { fill: #0a2520; }
  .teal-stroke { stroke: #1d7a60; }
  .teal-text   { fill: #6dd4b0; }
  .teal-sub    { fill: #3a8a70; }

  /* Gray — foundation model */
  .gray-fill   { fill: #1e1c1a; }
  .gray-stroke { stroke: #4a4640; }
  .gray-text   { fill: #8a857e; }
  .gray-sub    { fill: #5a5550; }

  /* Purple — agent core */
  .purple-fill   { fill: #1a1028; }
  .purple-stroke { stroke: #7060c0; }
  .purple-text   { fill: #c0b0f0; }
  .purple-sub    { fill: #7060a0; }

  /* Amber — outputs */
  .amber-fill   { fill: #2a1e08; }
  .amber-stroke { stroke: #c08020; }
  .amber-text   { fill: #f0c060; }
  .amber-sub    { fill: #906020; }

  /* Arrow lines */
  .arr {
    stroke: #3a3530;
    stroke-width: 1;
    fill: none;
  }

  .arr-main {
    stroke: #4a4540;
    stroke-width: 1.2;
    fill: none;
  }

  /* Moat bracket */
  .moat-line {
    stroke: #c55535;
    stroke-width: 1;
    fill: none;
    opacity: 0.5;
  }

  .moat-dash {
    stroke: #3a3530;
    stroke-width: 1;
    fill: none;
    stroke-dasharray: 3 3;
  }

  .moat-label {
    font-size: 10px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    fill: #c55535;
    letter-spacing: 0.04em;
    opacity: 0.7;
  }

  /* Legend */
  .legend {
    margin-top: 32px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #7a756e;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="header">
  <h1>My Magic Agent</h1>
  <p>AI Architecture · Phase 1 Blueprint</p>
</div>

<div class="diagram-wrap">

<defs>

    <path d="M2 1L8 5L2 9" fill="none" stroke="#4a4540" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-main" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">

<!-- ── LAYER LABELS ── -->

<text class="node-sub coral-sub" x="435" y="148" text-anchor="middle" dominant-baseline="central">Completion &amp; behaviour</text>

<rect x="524" y="110" width="192" height="54" rx="6" class="coral-fill" stroke-width="0.5" stroke="#c55535"/>
<text class="node-title coral-text" x="620" y="131" text-anchor="middle" dominant-baseline="central">Evolution tracking</text>
<text class="node-sub coral-sub" x="620" y="148" text-anchor="middle" dominant-baseline="central">Start vs. end milestones</text>

<!-- Arrows: inputs → RAG -->
<line x1="99"  y1="164" x2="290" y2="210" class="arr" marker-end="url(#arrow)" opacity="0.4"/>
<line x1="267" y1="164" x2="330" y2="210" class="arr" marker-end="url(#arrow)" opacity="0.4"/>

<line x1="620" y1="164" x2="460" y2="210" class="arr" marker-end="url(#arrow)" opacity="0.4"/>

<rect x="180" y="204" width="420" height="76" rx="8" class="teal-fill" stroke-width="0.8" stroke="#1d7a60"/>

<text class="node-sub" x="390" y="534" text-anchor="middle" dominant-baseline="central" fill="#3a2858" font-size="10">This is the layer MM owns · the intelligence wrapper</text>

<line x1="185" y1="548" x2="100" y2="590" class="arr" marker-end="url(#arrow)" opacity="0.5"/>
